# Blueprint Render — PHP Docker + Supabase PostgreSQL
services:
  - type: web
    name: labhub-uniceplac
    runtime: docker
    plan: free
    region: oregon
    healthCheckPath: /index.php
    envVars:
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        value: aws-1-sa-east-1.pooler.supabase.com
      - key: DB_PORT
        value: "5432"
      - key: DB_SSLMODE
        value: require
      - key: DB_DATABASE
        value: postgres
      - key: DB_USERNAME
        value: postgres.eqawtpbvcqlcemysjkox
      - key: DB_PASSWORD
        sync: false
      - key: APP_ENV
        value: production
      - key: APP_URL
        value: https://labhub-uniceplac.onrender.com
      - key: MAIL_HOST
        value: smtp-relay.brevo.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USERNAME
        value: ae8949001@smtp-brevo.com
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM_ADDRESS
        value: admin@uniceplac.edu.br
      - key: MAIL_FROM_NAME
        value: LabHub UNICEPLAC
